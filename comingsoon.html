<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vibrant Fusion – Coming Soon</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

  <!-- Font Awesome for Instagram icon -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #ff9966, #ff5e62, #ffc371);
      background-size: 400% 400%;
      animation: gradientShift 10s ease infinite;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      overflow: hidden;
    }

    .container {
      max-width: 650px;
      padding: 20px;
      animation: fadeIn 1.2s ease-in-out;
    }

    h1 {
      font-size: 3.2rem;
      margin-bottom: 10px;
      font-weight: 600;
    }

    h2 {
      font-size: 1.5rem;
      font-weight: 300;
      margin-bottom: 20px;
    }

    p {
      font-size: 1.1rem;
      opacity: 0.9;
    }

    .emoji {
      font-size: 2.5rem;
      margin-bottom: 15px;
      animation: float 3s ease-in-out infinite;
    }

    /* Instagram button */
    .instagram {
      margin-top: 25px;
    }

    .instagram a {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 20px;
      border-radius: 30px;
      background: rgba(255,255,255,0.15);
      color: #fff;
      text-decoration: none;
      font-size: 1rem;
      transition: all 0.3s ease;
      backdrop-filter: blur(8px);
    }

    .instagram a:hover {
      background: #fff;
      color: #ff5e62;
      transform: translateY(-3px);
    }

    .instagram i {
      font-size: 1.2rem;
    }

    /* floating fruit bubbles */
    .bubble {
      position: absolute;
      bottom: -100px;
      font-size: 2rem;
      animation: rise 12s infinite ease-in;
    }

    .bubble:nth-child(1) { left: 10%; animation-duration: 10s; }
    .bubble:nth-child(2) { left: 25%; animation-duration: 14s; }
    .bubble:nth-child(3) { left: 50%; animation-duration: 12s; }
    .bubble:nth-child(4) { left: 70%; animation-duration: 16s; }
    .bubble:nth-child(5) { left: 90%; animation-duration: 11s; }

    @keyframes rise {
      0% { transform: translateY(0) scale(1); opacity: 1; }
      100% { transform: translateY(-110vh) scale(1.5); opacity: 0; }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-12px); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .logo {
  width: 140px;
  margin-bottom: 15px;
  animation: fadeIn 1s ease-in-out;
}
  </style>
</head>

<body>

  <!-- floating tropical elements -->
  <div class="bubble">🥭</div>
  <div class="bubble">🍍</div>
  <div class="bubble">🍓</div>
  <div class="bubble">🥥</div>
  <div class="bubble">🍊</div>

  <div class="container">
    <img src="images/vflogo.jpeg" alt="Vibrant Fusion Logo" class="logo">
    <div class="emoji">🌴🥤✨</div>
    <h1>Vibrant Fusion</h1>
    <h2>Fresh blends. Feel-good vibes</h2>
    <p>We’re blending something bold, fresh, and unforgettable.<br/>Launching soon.</p>

    <!-- Instagram link -->
    <div class="instagram">
      <a href="https://instagram.com/vibrantfusion" target="_blank">
        <i class="fa-brands fa-instagram"></i>
        Follow us on Instagram
      </a>
    </div>
  </div>

</body>
</html>

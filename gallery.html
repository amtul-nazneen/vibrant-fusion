<style>

/* ===== GLOBAL CONTAINER ===== */
.container {
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 20px;
}

/* ===== HEADER ===== */
.gallery-header {
  text-align: center;
  margin: 50px 0 30px;
}

.gallery-header h2 {
  font-family: 'Poppins';
  /*color: #ef4444;*/
  font-size: 2.5rem;
}

.gallery-header p {
  color: #555;
  margin-top: 10px;
}

/* ===== FLEXIBLE GRID ===== */
.gallery-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  grid-auto-rows: 200px; /* fallback row height */
  gap: 15px;
}

.gallery-grid img {
  width: 100%;
  height: 100%;
  object-fit: cover; /* crops intelligently without stretching */
  border-radius: 14px;
  transition: transform 0.3s ease;
}

.gallery-grid img:hover {
  transform: scale(1.05);
}

/* ===== INSTAGRAM ===== */
.instagram-section {
  text-align: center;
  margin: 60px 0;
}

.instagram-section h2 {
  font-family: 'Poppins';
}

.instagram-section p {
  margin: 10px 0 20px;
  color: #555;
}

.instagram-button {
  display: inline-block;
  background: #ef4444;
  color: white;
  padding: 10px 22px;
  border-radius: 25px;
  text-decoration: none;
  font-weight: 600;
}

/* ===== MOBILE ===== */
@media(max-width: 500px) {
  .gallery-grid {
    grid-auto-rows: 180px; /* smaller on mobile */
  }
}

</style>
